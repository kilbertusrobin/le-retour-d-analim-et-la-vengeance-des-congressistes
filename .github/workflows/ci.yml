name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, zip, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --no-interaction
        env:
          APP_ENV: test
          JWT_PASSPHRASE: analim-jwt-passphrase

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists
        env:
          APP_ENV: test

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        env:
          APP_ENV: test

      - name: Run tests
        run: php bin/phpunit
        env:
          APP_ENV: test

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
